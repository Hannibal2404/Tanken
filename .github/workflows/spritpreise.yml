name: Spritpreise

on:
  # --- MOTOR: externer Trigger (cron-job.org) ---------------------------------
  # Alle 20 Minuten per repository_dispatch. Grund: GitHubs eigener Scheduler
  # ist "best effort" und laesst Laeufe stundenlang liegen oder verwirft sie
  # ganz (beim Schwesterprojekt Wetter: an drei Tagen gar nicht, sonst bis zu
  # 7 h zu spaet). Fuer einen Preistracker ist das fatal, weil Tankerkoenig
  # keine Historie nachliefert -- ein ausgefallener Lauf ist dauerhaft
  # verlorene Datenlage. Der externe Trigger feuert in ~40 Sekunden.
  repository_dispatch:
    types: [spritpreise]

  # --- SICHERHEITSNETZ: GitHubs eigener Cron ---------------------------------
  # Bewusst duenn (alle 2 h, krumme Minute). Faellt cron-job.org aus oder
  # laeuft das Token ab, sammelt das Repo wenigstens grob weiter, statt still
  # zu verstummen. Ueberfluessige Laeufe kosten nichts: die Delta-Logik
  # schreibt bei unveraenderten Preisen keine Zeile.
  #
  # Zeitzone spielt keine Rolle -- der Job laeuft rund um die Uhr
  # gleichmaessig. In der CSV steht UTC, angezeigt wird Europe/Berlin.
  schedule:
    - cron: "13 */2 * * *"

  # Manuell ausloesbar (Actions-Tab -> Run workflow).
  workflow_dispatch:
    inputs:
      refresh_stations:
        description: "Umkreissuche neu durchfuehren (nach Radius-Aenderung)"
        type: boolean
        default: false

# BEWUSST KEIN push-Trigger: der Job committet selbst ins Repo und wuerde sich
# sonst endlos neu starten. Zweite Sicherung ist "[skip ci]" in der Message.

permissions:
  contents: write   # Historie ins Repo zurueck-committen
  pages: write      # GitHub-Pages-Deploy
  id-token: write   # OIDC-Token fuer deploy-pages

# Nie zwei Laeufe gleichzeitig -- sonst schreiben beide am selben Branch.
concurrency:
  group: spritpreise
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4
        with:
          # Volle Historie: nur damit funktioniert der rebase-Fallback im
          # Push-Schritt zuverlaessig. Die Commits sind winzig (wenige Zeilen
          # CSV), das faellt beim Klonen nicht ins Gewicht.
          fetch-depth: 0
        # checkout legt den GITHUB_TOKEN als Git-Credential ab -- damit
        # funktioniert der Push weiter unten ohne PAT.

      - name: Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Abhaengigkeiten installieren
        run: pip install -r requirements.txt

      - name: Preise abrufen, Historie fortschreiben, Dashboard bauen
        env:
          TANKERKOENIG_API_KEY: ${{ secrets.TANKERKOENIG_API_KEY }}
          # Seltenheits-Push (optional): ist das Secret NTFY_TOPIC nicht gesetzt,
          # bleibt der Push komplett aus -- das Skript prueft die Variable selbst.
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NTFY_SERVER: ${{ secrets.NTFY_SERVER }}
        # Die Umkreissuche laesst sich auf beiden Wegen erzwingen: per Haekchen
        # im Actions-Dialog oder per {"client_payload":{"refresh_stations":true}}
        # im Dispatch-Body. Beim Schedule sind beide null -> normaler Lauf.
        # (Noetig ist das ohnehin selten: aendert sich max_stations/radius_km
        # in der CONFIG, erkennt das Skript das von allein.)
        run: |
          python spritpreise.py --out ./public \
            ${{ (inputs.refresh_stations || github.event.client_payload.refresh_stations)
                && '--refresh-stations' || '' }}

      - name: Historie zurueck-committen
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          if git diff --staged --quiet; then
            echo "Keine Preisaenderung -- nichts zu committen."
            exit 0
          fi
          git commit -m "Preisdaten $(date -u '+%Y-%m-%d %H:%M UTC') [skip ci]"
          # Falls doch mal ein Lauf dazwischengekommen ist: sauber daraufsetzen.
          for i in 1 2 3; do
            if git push; then exit 0; fi
            echo "Push abgelehnt -- rebase und erneut versuchen ($i/3)."
            git pull --rebase origin "${GITHUB_REF_NAME}"
          done
          echo "Push nach 3 Versuchen fehlgeschlagen." >&2
          exit 1

      - name: Pages-Artefakt hochladen
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Auf GitHub Pages veroeffentlichen
        id: deployment
        uses: actions/deploy-pages@v4
